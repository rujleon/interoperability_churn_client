
services:

  # ─── Base de données PostgreSQL ───────────────────────
  postgres_db:
    image: postgres:15-alpine
    container_name: churn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB:       churn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - churn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d churn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Flask ────────────────────────────────
  flask_app:
    build: .
    container_name: churn_flask
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Clé secrète Flask
      SECRET_KEY:        "mon_secret_ultra_secure_2026"
      # Connexion PostgreSQL — pointe vers le service 'postgres_db'
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_HOST:     postgres_db       # nom du service = hostname dans Docker
      POSTGRES_PORT:     5432
      POSTGRES_DB:       churn_db
      FLASK_DEBUG:       "false"
    volumes:
      - ./models:/app/models               # Partage le dossier models (pkl)
      - ./data:/app/data                   # Données CSV si besoin
    depends_on:
      postgres_db:
        condition: service_healthy         # Attend que Postgres soit prêt
    networks:
      - churn_network

  # ─── pgAdmin (interface web DB) ───────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: churn_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - churn_network
    depends_on:
      - postgres_db

# ─── Volumes & Réseaux ────────────────────────────────
volumes:
  postgres_data:

networks:
  churn_network:
    driver: bridge